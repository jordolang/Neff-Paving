name: CodeQL

# Static analysis (code scanning) for the site's JavaScript sources.
# Results show up under the repo's Security → Code scanning tab.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '23 5 * * 1'   # weekly, Monday 05:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to code scanning
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ javascript-typescript ]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
