name: Sync Facebook Album to Gallery

# Pulls new photos from the "Website Feed" Facebook album into the site gallery,
# then pushes straight to main so the change publishes automatically — no PR, no
# manual merge. main is a protected branch, so this uses an admin Personal Access
# Token (secret GALLERY_SYNC_TOKEN) which is allowed to bypass the protection.

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily (~4-5 AM Eastern)
  workflow_dispatch:        # manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: facebook-gallery-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Admin PAT so the auto-commit can bypass branch protection on main.
          token: ${{ secrets.GALLERY_SYNC_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Facebook album
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_ALBUM_ID: ${{ secrets.FB_ALBUM_ID }}   # optional override; defaults in script
        run: node scripts/fetch-facebook-album.js

      - name: Commit & push gallery changes
        run: |
          git config user.name "neff-paving-bot"
          git config user.email "actions@github.com"
          git add assets/gallery/facebook src/data/facebook-images.js
          if git diff --staged --quiet; then
            echo "No gallery changes to commit."
          else
            git commit -m "chore: sync Facebook album to gallery"
            git push origin HEAD:main
            echo "Pushed updated gallery to main — deploy will publish it."
          fi
