    <!-- 404 styling — matches redesign dark/gold theme -->
    <style>
        :root {
            --bg: #0b0b0d;
            --surface: #15151a;
            --line: #26262e;
            --gold: #f5a524;
            --gold-2: #ffb84d;
            --gold-deep: #d98c0f;
            --on-gold: #0b0b0d;
            --text: #f4f5f6;
            --muted: #8a99a3;
            --font-head: 'Oswald', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-body: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background:
                radial-gradient(900px 500px at 50% -10%, rgba(245,165,36,.10), transparent 60%),
                var(--bg);
            color: var(--text);
            text-align: center;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .mark {
            width: 76px; height: 76px; margin: 0 auto 28px;
            display: grid; place-items: center;
        }
        .mark img { width: 100%; height: 100%; object-fit: contain; }
        .mark svg { width: 36px; height: 36px; }
        .code {
            font-family: var(--font-head); font-weight: 700;
            font-size: clamp(4rem, 16vw, 8rem); line-height: 1;
            letter-spacing: -2px; color: var(--gold); margin: 0;
        }
        h1 {
            font-family: var(--font-head); font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
            font-size: clamp(1.4rem, 4vw, 2rem);
            margin: 8px 0 16px; color: var(--text);
        }
        p { font-size: 1.05rem; color: var(--muted); margin: 0 0 12px; line-height: 1.6; }
        .actions { margin-top: 30px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            font-family: var(--font-head); font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase; font-size: 15px;
            padding: 15px 28px; border-radius: 999px;
            border: 2px solid transparent; cursor: pointer; text-decoration: none;
            transition: transform .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
        }
        .btn-primary { background: var(--gold); color: var(--on-gold); box-shadow: 0 12px 30px -10px rgba(245,165,36,.4); }
        .btn-primary:hover { background: var(--gold-2); transform: translateY(-3px); }
        .btn-outline { background: transparent; color: var(--text); border-color: var(--line); }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-3px); }
    </style>

    <!-- Client-side routing redirect script -->
    <script type="text/javascript">
        // GitHub Pages client-side routing support
        (function() {
            var baseUrl = window.location.origin;
            var pathname = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;

            // For GitHub Pages, we need to handle the base path
            var githubPagesBase = '/Neff-Paving';

            // If we're on GitHub Pages and the path doesn't start with base, redirect
            if (pathname.startsWith(githubPagesBase)) {
                // Remove the base path from the pathname
                var cleanPath = pathname.replace(githubPagesBase, '') || '/';

                // Redirect to index.html with the path as a parameter
                var redirectUrl = baseUrl + githubPagesBase + '/index.html?404=true&path=' + encodeURIComponent(cleanPath);

                if (search) {
                    redirectUrl += '&search=' + encodeURIComponent(search);
                }
                if (hash) {
                    redirectUrl += '&hash=' + encodeURIComponent(hash);
                }

                window.location.href = redirectUrl;
            } else {
                // Fallback for other deployments
                window.location.href = baseUrl + '/index.html?404=true&path=' + encodeURIComponent(pathname);
            }
        })();
    </script>
